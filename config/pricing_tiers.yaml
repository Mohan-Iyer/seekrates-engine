# =============================================================================
feature_matrix:
  headers: ["Feature", "Free", "PAYG", "Lite $19", "Pro $49", "Business $149"]
  
  rows:
    - feature: "AI Models"
      values: ["5", "5", "5", "5", "5"]
      
    - feature: "Queries"
      values: ["100/mo", "Unlimited", "200/mo", "600/mo", "2,500/mo"]
      
    - feature: "Input Tokens"
      values: ["1K", "Up to 20K", "6K", "10K", "15K"]
      
    - feature: "Output Tokens"
      values: ["1.5K", "Up to 15K", "4K", "8K", "12K"]
      
    - feature: "Cost per Query"
      values: ["Free", "$0.15-1.00", "$0.095", "$0.082", "$0.060"]
      
    - feature: "API Access"
      values: ["No", "No", "No", "100/day", "500/day"]
      
    - feature: "History"
      values: ["7 days", "30 days", "30 days", "90 days", "1 year"]
      
    - feature: "Team Accounts"
      values: ["No", "No", "No", "No", "5 users"]

